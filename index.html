<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RaceBox MotoGP - Real-time GPS Speedometer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 50, 0, 0.3);
        }

        .login-screen, .dashboard-screen {
            transition: all 0.3s ease;
        }

        .login-card {
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 450px;
            margin: 5vh auto;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
            border: 1px solid #ff3c00;
            text-align: center;
        }

        .login-card h2 {
            color: #ff5e00;
            font-family: 'Orbitron', monospace;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            color: #ddd;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #11161f;
            border: 1px solid #ff5e0055;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #ff5e00;
            box-shadow: 0 0 10px #ff5e00;
        }

        button {
            background: linear-gradient(95deg, #ff3c00, #ff8c00);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(0.98);
            filter: brightness(1.05);
        }

        .error-msg {
            color: #ff5e4a;
            margin-top: 15px;
            font-size: 14px;
        }

        .dashboard-screen {
            display: none;
        }

        .race-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.6);
            border-radius: 60px;
            padding: 10px 25px;
            margin-bottom: 25px;
            border-bottom: 2px solid #ff5e00;
        }

        .user-info {
            color: white;
            font-weight: bold;
            background: #000000aa;
            padding: 8px 18px;
            border-radius: 40px;
        }

        .admin-badge {
            background: #ff3c00;
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-logout {
            background: #222;
            width: auto;
            padding: 8px 20px;
            font-size: 14px;
        }

        .speed-panel {
            background: radial-gradient(ellipse at 30% 40%, #10141f, #000000cc);
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid #ff5e0088;
        }

        .speed-value {
            font-size: 8rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            color: #ff5e00;
            text-shadow: 0 0 20px #ff3c00;
            line-height: 1;
        }

        .speed-unit {
            font-size: 2rem;
            color: #ccc;
            margin-left: 10px;
        }

        .gps-status {
            margin-top: 15px;
            background: #0a0e17;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
        }

        .info-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .card {
            background: #0b0f19bb;
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 18px;
            flex: 1;
            min-width: 180px;
            border: 1px solid #ff5e0044;
        }

        .card-title {
            color: #ffa05e;
            font-size: 14px;
        }

        .card-value {
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .admin-panel-section {
            background: #03060cee;
            border-radius: 36px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #ff9900;
            display: none;
        }

        .admin-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .admin-form .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        .user-list {
            margin-top: 20px;
            background: #00000066;
            border-radius: 24px;
            padding: 15px;
        }

        .user-list span {
            display: inline-block;
            background: #ff3c0022;
            margin: 5px 8px;
            padding: 5px 12px;
            border-radius: 20px;
            color: #ffbb88;
        }

        .mode-selector {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .mode-btn {
            width: auto;
            padding: 8px 16px;
            font-size: 12px;
            background: #333;
        }

        .mode-btn.active {
            background: #ff5e00;
        }

        @media (max-width: 700px) {
            .speed-value { font-size: 4rem; }
            .race-header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h2>🏁 RACEBOX MOTO🏍️</h2>
            <div class="input-group">
                <label>👤 USERNAME</label>
                <input type="text" id="loginUsername" placeholder="Masukkan username terdaftar">
            </div>
            <div class="input-group">
                <label>🔒 PASSWORD</label>
                <input type="password" id="loginPassword" placeholder="********">
            </div>
            <button id="doLoginBtn">LOGIN & START ENGINE 🚀</button>
            <div id="loginError" class="error-msg"></div>
            <div style="margin-top: 20px; font-size: 12px; color: #aaa;">
                <strong>Akun Demo:</strong><br>
                Admin: admin / admin123<br>
                User: racerX / racer123
            </div>
        </div>
    </div>

    <div id="dashboardScreen" class="dashboard-screen">
        <div class="race-header">
            <div class="user-info">
                🏍️ RACER: <span id="displayUsername">-</span>
                <span id="adminBadge" class="admin-badge" style="display:none;">👑 ADMIN</span>
            </div>
            <button id="logoutBtn" class="btn-logout">🔌 LOGOUT</button>
        </div>

        <div class="speed-panel">
            <div class="speed-label">⚡ KECEPATAN REAL-TIME ⚡</div>
            <div><span class="speed-value" id="speedKmh">0.0</span><span class="speed-unit">km/h</span></div>
            <div class="gps-status" id="gpsStatusIcon">🛰️ Menyiapkan GPS...</div>
            <div class="mode-selector">
                <button id="gpsModeBtn" class="mode-btn active">📡 GPS REAL</button>
                <button id="simulateModeBtn" class="mode-btn">🎮 SIMULASI (TEST)</button>
            </div>
        </div>

        <div class="info-grid">
            <div class="card">
                <div class="card-title">📡 SATELIT</div>
                <div class="card-value" id="satCount">0</div>
            </div>
            <div class="card">
                <div class="card-title">🎯 AKURASI</div>
                <div class="card-value" id="accuracy">±0 m</div>
            </div>
            <div class="card">
                <div class="card-title">🧭 HEADING</div>
                <div class="card-value" id="heading">0°</div>
            </div>
            <div class="card">
                <div class="card-title">🏁 TOP SPEED</div>
                <div class="card-value" id="topSpeed">0 km/h</div>
            </div>
        </div>

        <div id="adminPanelContainer" class="admin-panel-section">
            <h3>🛠️ ADMIN PANEL - MANAJEMEN USER</h3>
            <div class="admin-form">
                <div class="input-group">
                    <label>Username Baru</label>
                    <input type="text" id="newUsername" placeholder="contoh: racer99">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="newPassword" placeholder="min 3 karakter">
                </div>
                <button id="addUserBtn" style="width: auto; padding: 12px 24px;">➕ TAMBAH USER</button>
            </div>
            <div id="adminMsg" style="color: #ffaa66; font-size: 13px; margin-top: 12px;"></div>
            <div class="user-list">
                <strong>📋 DAFTAR USER TERDAFTAR :</strong>
                <div id="userListContainer"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== DATABASE USER ==========
    let usersDB = [];

    function loadUsersFromStorage() {
        const stored = localStorage.getItem("racebox_users");
        if(stored) {
            usersDB = JSON.parse(stored);
        } else {
            usersDB = [
                { username: "admin", password: "admin123", role: "admin" },
                { username: "racerX", password: "racer123", role: "user" }
            ];
            saveUsersToStorage();
        }
    }

    function saveUsersToStorage() {
        localStorage.setItem("racebox_users", JSON.stringify(usersDB));
    }

    function authenticateUser(username, password) {
        return usersDB.find(u => u.username === username && u.password === password);
    }

    function addNewUser(username, password, role = "user") {
        if(!username || !password || username.length < 3 || password.length < 3) return false;
        if(usersDB.some(u => u.username === username)) return false;
        usersDB.push({ username, password, role });
        saveUsersToStorage();
        return true;
    }

    // ========== STATE GLOBAL ==========
    let currentUser = null;
    let watchId = null;
    let simulationInterval = null;
    let currentMode = "gps"; // gps or simulate
    let topSpeedSession = 0;
    let simulateSpeed = 0;
    let simulateDirection = 1; // 1 = naik, -1 = turun

    // DOM Elements
    const loginScreen = document.getElementById("loginScreen");
    const dashboardScreen = document.getElementById("dashboardScreen");
    const loginUsername = document.getElementById("loginUsername");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("doLoginBtn");
    const loginError = document.getElementById("loginError");
    const displayUsername = document.getElementById("displayUsername");
    const adminBadge = document.getElementById("adminBadge");
    const logoutBtn = document.getElementById("logoutBtn");
    const speedElement = document.getElementById("speedKmh");
    const satCountSpan = document.getElementById("satCount");
    const accuracySpan = document.getElementById("accuracy");
    const headingSpan = document.getElementById("heading");
    const topSpeedSpan = document.getElementById("topSpeed");
    const gpsStatusSpan = document.getElementById("gpsStatusIcon");
    const adminPanel = document.getElementById("adminPanelContainer");
    const addUserBtn = document.getElementById("addUserBtn");
    const newUsername = document.getElementById("newUsername");
    const newPassword = document.getElementById("newPassword");
    const adminMsg = document.getElementById("adminMsg");
    const userListContainer = document.getElementById("userListContainer");
    const gpsModeBtn = document.getElementById("gpsModeBtn");
    const simulateModeBtn = document.getElementById("simulateModeBtn");

    // Helper render user list
    function renderUserList() {
        if(!currentUser || currentUser.role !== "admin") return;
        userListContainer.innerHTML = usersDB.map(u => `<span>🏍️ ${u.username} (${u.role})</span>`).join('');
    }

    // Update speed display
    function updateSpeedDisplay(speed) {
        speedElement.innerText = speed.toFixed(1);
        if(speed > topSpeedSession) {
            topSpeedSession = speed;
            topSpeedSpan.innerText = topSpeedSession.toFixed(1) + " km/h";
        }
    }

    // ========== SIMULASI MODE (untuk testing tanpa GPS) ==========
    function startSimulation() {
        stopGPS();
        if(simulationInterval) clearInterval(simulationInterval);
        
        simulateSpeed = 0;
        simulateDirection = 1;
        gpsStatusSpan.innerHTML = "🎮 MODE SIMULASI - Kecepatan virtual aktif";
        gpsStatusSpan.style.color = "#ffaa44";
        satCountSpan.innerText = "SIM";
        accuracySpan.innerText = "±0 m (Simulasi)";
        headingSpan.innerText = "90°";
        
        simulationInterval = setInterval(() => {
            // Simulasi kecepatan naik turun seperti motor balap
            if(simulateDirection === 1) {
                simulateSpeed += 3 + Math.random() * 5;
                if(simulateSpeed >= 280) simulateDirection = -1;
            } else {
                simulateSpeed -= 4 + Math.random() * 6;
                if(simulateSpeed <= 0) {
                    simulateSpeed = 0;
                    simulateDirection = 1;
                }
            }
            simulateSpeed = Math.max(0, Math.min(320, simulateSpeed));
            updateSpeedDisplay(simulateSpeed);
            
            // Update heading acak
            let headingVal = Math.floor(Math.random() * 360);
            headingSpan.innerText = headingVal + "°";
        }, 100);
    }

    // ========== GPS REAL MODE ==========
    function stopGPS() {
        if(watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
    }

    function updateGPSCoordinates(position) {
        const speedMps = position.coords.speed;
        let kmh = 0;
        if(speedMps !== null && !isNaN(speedMps)) {
            kmh = speedMps * 3.6;
            kmh = Math.round(kmh * 10) / 10;
        }
        
        updateSpeedDisplay(kmh);
        
        const accuracy = position.coords.accuracy;
        if(accuracy !== undefined) {
            let satGuess = accuracy < 10 ? 14 : (accuracy < 30 ? 9 : 5);
            satCountSpan.innerText = satGuess;
            accuracySpan.innerText = `±${Math.round(accuracy)} m`;
        }
        
        if(position.coords.heading !== null && !isNaN(position.coords.heading)) {
            headingSpan.innerText = Math.round(position.coords.heading) + "°";
        }
        
        gpsStatusSpan.innerHTML = "🛰️ GPS LOCKED | REAL-TIME ✅";
        gpsStatusSpan.style.color = "#0f0";
    }

    function handleGPSError(error) {
        let errorMsg = "";
        switch(error.code) {
            case error.PERMISSION_DENIED:
                errorMsg = "Izin GPS ditolak! Klik izinkan atau gunakan mode SIMULASI";
                break;
            case error.POSITION_UNAVAILABLE:
                errorMsg = "Sinyal GPS tidak tersedia. Gunakan mode SIMULASI";
                break;
            case error.TIMEOUT:
                errorMsg = "Timeout GPS. Coba lagi atau gunakan SIMULASI";
                break;
            default:
                errorMsg = "Error GPS. Gunakan mode SIMULASI";
        }
        gpsStatusSpan.innerHTML = `❌ ${errorMsg}`;
        gpsStatusSpan.style.color = "#ff7777";
        
        // Jika gagal GPS, tawarkan simulasi otomatis?
        if(currentMode === "gps") {
            // tidak otomatis pindah, biar user pilih
        }
    }

    function startRealGPS() {
        stopSimulation();
        if(!navigator.geolocation) {
            gpsStatusSpan.innerHTML = "❌ Browser tidak support GPS! Gunakan mode SIMULASI";
            return;
        }
        
        gpsStatusSpan.innerHTML = "🛰️ Meminta izin GPS... Mohon izinkan akses lokasi";
        gpsStatusSpan.style.color = "#ffaa44";
        
        watchId = navigator.geolocation.watchPosition(
            updateGPSCoordinates,
            handleGPSError,
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    function stopSimulation() {
        if(simulationInterval) {
            clearInterval(simulationInterval);
            simulationInterval = null;
        }
    }

    // ========== MODE SWITCH ==========
    function switchToGPSMode() {
        currentMode = "gps";
        gpsModeBtn.classList.add("active");
        simulateModeBtn.classList.remove("active");
        stopSimulation();
        startRealGPS();
        topSpeedSession = 0;
        topSpeedSpan.innerText = "0 km/h";
    }
    
    function switchToSimulateMode() {
        currentMode = "simulate";
        simulateModeBtn.classList.add("active");
        gpsModeBtn.classList.remove("active");
        stopGPS();
        startSimulation();
        topSpeedSession = 0;
        topSpeedSpan.innerText = "0 km/h";
    }

    // ========== LOGIN & LOGOUT ==========
    function loadDashboard(user) {
        currentUser = user;
        loginScreen.style.display = "none";
        dashboardScreen.style.display = "block";
        displayUsername.innerText = user.username;
        topSpeedSession = 0;
        topSpeedSpan.innerText = "0 km/h";
        
        if(user.role === "admin") {
            adminBadge.style.display = "inline-block";
            adminPanel.style.display = "block";
            renderUserList();
        } else {
            adminBadge.style.display = "none";
            adminPanel.style.display = "none";
        }
        
        // Default mode GPS
        switchToGPSMode();
    }
    
    function logout() {
        stopGPS();
        stopSimulation();
        currentUser = null;
        loginScreen.style.display = "flex";
        dashboardScreen.style.display = "none";
        loginUsername.value = "";
        loginPassword.value = "";
        loginError.innerText = "";
    }
    
    function attemptLogin() {
        const username = loginUsername.value.trim();
        const password = loginPassword.value.trim();
        if(!username || !password) {
            loginError.innerText = "Isi username dan password!";
            return;
        }
        const user = authenticateUser(username, password);
        if(user) {
            loginError.innerText = "";
            loadDashboard(user);
        } else {
            loginError.innerText = "❌ Username tidak terdaftar atau password salah!";
        }
    }
    
    function handleAddUser() {
        if(!currentUser || currentUser.role !== "admin") {
            adminMsg.innerText = "Hanya admin yang bisa menambah user!";
            return;
        }
        const name = newUsername.value.trim();
        const pass = newPassword.value.trim();
        if(!name || !pass || name.length < 3 || pass.length < 3) {
            adminMsg.innerText = "Username/password minimal 3 karakter!";
            return;
        }
        if(addNewUser(name, pass, "user")) {
            adminMsg.innerText = `✅ User "${name}" berhasil ditambahkan!`;
            newUsername.value = "";
            newPassword.value = "";
            renderUserList();
        } else {
            adminMsg.innerText = `❌ Username "${name}" sudah ada!`;
        }
    }
    
    // ========== INIT ==========
    function init() {
        loadUsersFromStorage();
        
        loginBtn.addEventListener("click", attemptLogin);
        loginUsername.addEventListener("keypress", (e) => { if(e.key === "Enter") attemptLogin(); });
        loginPassword.addEventListener("keypress", (e) => { if(e.key === "Enter") attemptLogin(); });
        logoutBtn.addEventListener("click", logout);
        addUserBtn.addEventListener("click", handleAddUser);
        gpsModeBtn.addEventListener("click", switchToGPSMode);
        simulateModeBtn.addEventListener("click", switchToSimulateMode);
        
        dashboardScreen.style.display = "none";
        loginScreen.style.display = "flex";
        
        // Cek apakah admin ada
        if(!usersDB.some(u => u.username === "admin")) {
            usersDB.push({ username: "admin", password: "admin123", role: "admin" });
            saveUsersToStorage();
        }
    }
    
    init();
</script>
</body>
</html>
